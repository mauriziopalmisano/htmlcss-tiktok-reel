<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="header-btn">
        <div class="play-btn">
          <i class="bi bi-play-btn"></i>
        </div>
        <div class="socials-btn">
          <p class="esplora-btn">Esplora</p>
          <p class="seguiti-btn">Seguiti</p>
          <p class="perte-btn">Per te</p>
        </div>
        <div class="search-btn">
          <i class="bi bi-search"></i>
        </div>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="actions-btn">
        <div class="profile-btn">
          <img src="./assets/img/boolean_logo.png" alt="immagine profilo" class="img-profile">
          <i class="bi bi-plus-circle plus-icon"></i>
        </div>
        <div class="like-btn">
          <i class="bi bi-heart-fill d-block size-sb"></i>
          <p class="text-sb">588</p>
        </div>
        <div class="comment-btn">
          <i class="bi bi-chat-dots-fill d-block size-sb"></i>
          <p class="text-sb">13</p>
        </div>
        <div class="save-btn">
          <i class="bi bi-bookmark-fill d-block size-sb"></i>
          <p class="text-sb">638</p>
        </div>
        <div class="send-btn">
          <i class="bi bi-sign-turn-slight-right-fill d-block size-sb"></i>
          <p class="text-sb">491</p>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-container">
        <div class="footer-des">
          <p class="des-title"> boolean.careers</p>
          <p class="des-text">Prova il Fundamentals Camp. 20 ore di corso gratuito per... <strong>Vedi altro</strong></p>
        </div>
        <div class="footer-btn">
          <div class="home-btn">
            <i class="bi bi-house-fill d-block"></i>Home
          </div>
          <div class="friends-btn">
            <i class="bi bi-people d-block"></i>Amici
          </div>
          <div class="publish-btn">
            <i class="bi bi-file-plus-fill ruota-icona"></i>
          </div>
          <div class="chat-btn">
            <i class="bi bi-chat-square d-block"></i>Posta in arrivo
               </div>
          <div class="uprofile-btn">
            <i class="bi bi-person d-block"></i>Profilo
            
          </div>
        </div>
      </div>
    </footer>
  </div>

</body>

</html>
